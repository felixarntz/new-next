name: E2E

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 */6 * * *"

jobs:
  test-scaffold-pnpm:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Enable PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Build CLI
        run: |
          bun install
          bun run build

      - name: Scaffold project with PNPM
        run: |
          mkdir test-project-pnpm && cd test-project-pnpm
          git init
          git config user.name "CI"
          git config user.email "ci@test"
          npx --yes "$GITHUB_WORKSPACE" . --shadcn --ai-sdk --ai-elements
          test -f pnpm-lock.yaml
          test ! -f bun.lock
          grep -q "pnpm dev" AGENTS.md
          grep -q "pnpm dlx shadcn@latest add button" AGENTS.md

  test-scaffold-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Build CLI
        run: |
          bun install
          bun run build

      - name: Scaffold project with Bun
        run: |
          mkdir test-project-bun && cd test-project-bun
          git init
          git config user.name "CI"
          git config user.email "ci@test"
          npx --yes "$GITHUB_WORKSPACE" . --bun --shadcn --ai-sdk --ai-elements
          test -f bun.lock
          test ! -f pnpm-lock.yaml
          grep -q "bun dev" AGENTS.md
          grep -q "bunx --bun shadcn@latest add button" AGENTS.md
